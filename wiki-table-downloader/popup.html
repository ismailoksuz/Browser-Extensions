<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <h2>Wiki Scraper</h2>
      <p>Enable the system, find a table on Wikipedia, and use the "Export CSV" trigger to extract data.</p>      
      <div id="statsArea" class="stats-box">
        <span class="stats-label">FOUND TABLES:</span>
        <span id="tableCount" class="stats-value">0</span>
      </div>

      <button id="toggleBtn" class="passive-mode">ACTIVATE</button>
    </div>
    <div class="credit">CREATED BY <a href="https://github.com/ismailoksuz" target="_blank">ISMAIL OKSUZ</a></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
